[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

# Single cron service that runs all workers sequentially via run_all.py.
# If one worker fails it is logged — the container does NOT crash.
[[services]]
name = "fitsync-sync"
startCommand = "python run_all.py"

[services.deploy]
cronSchedule = "0 4,11,18 * * *"   # 07:00, 14:00, 21:00 Israel (04:00, 11:00, 18:00 UTC)

# IMPORTANT: Add a Railway Volume mounted at /data/garth_tokens for Garmin auth.
# First run: set GARMIN_TOKENSTORE=/data/garth_tokens — tokens persist across restarts.
# Without a Volume, Garmin re-authenticates each run (429 risk).
